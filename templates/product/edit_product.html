{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Edit Product: {{ product.name }}</h3>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
