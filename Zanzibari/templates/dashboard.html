{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | MZANZIBARI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar {
      height: 100vh;
      background-color: #001f3f;
      color: white;
      padding-top: 20px;
      position: fixed;
      width: 230px;
    }
    .sidebar a {
      color: white;
      display: block;
      padding: 10px 20px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #003366;
    }
    .main-content {
      margin-left: 230px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h4 class="text-center mb-4">MZANZIBARI</h4>
    <a href="{% url 'dashboard' %}">🏠 Dashboard</a>
    <a href="{% url 'export_csv' %}">⬇️ Export CSV</a>
    <a href="{% url 'export_excel' %}">⬇️ Export Excel</a>
    <a href="{% url 'export_pdf' %}">⬇️ Export PDF</a>
    <a href="{% url 'logout' %}">🚪 Logout</a>
  </div>

  <div class="main-content">
    <h3>Welcome, {{ username }}</h3>
    <p class="text-muted">You’re logged into the MZANZIBARI management system.</p>

    <div class="row mt-4">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Sales Summary</h5>
            <p class="card-text">Coming soon...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Inventory Status</h5>
            <p class="card-text">Coming soon...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Recent Activities</h5>
            <p class="card-text">Coming soon...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
